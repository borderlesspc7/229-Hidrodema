[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Todas as variáveis VITE_FIREBASE_* são públicas por design:
  # o Firebase Web SDK exige que essas configs sejam incluídas no bundle do cliente.
  # Segurança é garantida via Firestore/Storage rules e App Check, não por sigilo.
  # Ver: https://firebase.google.com/docs/projects/api-keys
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_DATABASE_ID"

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

